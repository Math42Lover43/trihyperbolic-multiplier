<!DOCTYPE html>
<html>
	<head>
		<title>
			Trihyperbolic multiplier
		</title>
		<meta charset="utf-8">
		<style>
			body, input {
				font-family: 'Times New Roman';
				font-size: 12pt;
			}
			input {
				width: 10%;
			}
		</style>
	</head>
	<body>
		<div id="factor1">
			
		</div>
		<button onclick="multiply();">
			Multiply
		</button>
		<table id="result">
			<tr>
				<td>
					1
				</td>
				<td id="res00">

				</td>
			</tr>
			<tr>
				<td>
					&eth;
				</td>
				<td id="res10">

				</td>
			</tr>
			<tr>
				<td>
					&ETH;
				</td>
				<td id="res20">

				</td>
			</tr>
			<tr>
				<td>
					&thorn;
				</td>
				<td id="res01">

				</td>
			</tr>
			<tr>
				<td>
					&eth;&thorn;
				</td>
				<td id="res11">

				</td>
			</tr>
			<tr>
				<td>
					&ETH;&thorn;
				</td>
				<td id="res21">

				</td>
			</tr>
			<tr>
				<td>
					&THORN;
				</td>
				<td id="res02">

				</td>
			</tr>
			<tr>
				<td>
					&eth;&THORN;
				</td>
				<td id="res12">

				</td>
			</tr>
			<tr>
				<td>
					&ETH;&THORN;
				</td>
				<td id="res22">

				</td>
			</tr>
		</table>
	</body>
	<script>
		var inserts = 0;
		function insertfact(id) {
			document.getElementById(id).innerHTML += `
				<div style="padding: 5px;">
					<input id="thnum${inserts}00" value="1"/> +
					<input id="thnum${inserts}10"/>&eth; +
					<input id="thnum${inserts}20"/>&ETH; +
					<input id="thnum${inserts}01"/>&thorn; +
					<input id="thnum${inserts}11"/>&eth;&thorn; +
					<input id="thnum${inserts}21"/>&ETH;&thorn; +
					<input id="thnum${inserts}02"/>&THORN; +
					<input id="thnum${inserts}12"/>&eth;&THORN; +
					<input id="thnum${inserts}22"/>&ETH;&THORN;
				</div>
			`;
			inserts++;
		}
		function multiply() {
			var num1 = [];
			var num2 = [];
			for(let a = 0; a < 3; a++) {
				for(let b = 0; b < 3; b++) {
					num1.push(document.getElementById(`thnum0${b}${a}`).value);
					num2.push(document.getElementById(`thnum1${b}${a}`).value);
					document.getElementById(`res${b}${a}`).innerHTML = "";
				}
			}
			for(let b = 0; b < 9; b++) {
				for(let a = 0; a < 9; a++) {
					document.getElementById(`res${(a + b) % 3}${(Math.floor(a / 3) + Math.floor(b / 3)) % 3}`).innerHTML += `+ (${num1[a]})(${num2[b]}) `;
				}
			}
		}
		insertfact("factor1");
		insertfact("factor1");
	</script>
</html>
